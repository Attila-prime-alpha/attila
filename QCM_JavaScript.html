<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

<body>
  <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz - Site Attila</title>

<style>
  nav {
    background-color: #222;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 15px;
    font-weight: bold;
}

nav a:hover {
    color: skyblue;
}

body{
    font-family: Arial, sans-serif;
    background: black;
    color:white;
    text-align:center;
    padding:40px;
}

.quiz{
    animation: apparition 1.5s ease;
}

@keyframes apparition{
    from{
        opacity:0;
        transform: translateY(-20px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

.question{
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:20px auto;
    width:60%;
    border-radius:10px;
}


h1 {
    animation: pulsation 2s ease-in-out infinite;
}

@keyframes pulsation {
    0%, 100% {
        transform: scale(1);
        text-shadow: 0 0 10px rgba(0, 255, 213, 0.5);
    }
    50% {
        transform: scale(1.05);
        text-shadow: 0 0 20px rgba(0, 255, 213, 0.8),
                     0 0 30px rgba(0, 255, 213, 0.6);
    }
}

button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00ffd5;
    color:black;
    transform:scale(1.1);
}

select, input{
    padding:10px;
    border-radius:6px;
    border:none;
}

#resultat{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}


.score-animation {
    animation: rebond 0.8s ease;
}

@keyframes rebond {
    0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
    }
    50% {
        transform: scale(1.2) rotate(180deg);
    }
    70% {
        transform: scale(0.9) rotate(270deg);
    }
    100% {
        transform: scale(1) rotate(360deg);
        opacity: 1;
    }
}

</style>
</head>

<body>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="page2.html">Histoire</a>
    <a href="page3.html">Modèles</a>
    <a href="QCM_JavaScript.html">Quiz</a>
</nav>

<h1>Quiz sur mon site Web</h1>

<div class="quiz">

<div class="question">
<h3>1️⃣ Les Glock sont des pistolets semi-automatiques conçus par Glock GmbH.</h3>

<button onclick="repondreVrai()">Vrai</button>
<button onclick="repondreFaux()">Faux</button>

<p id="rep1"></p>
</div>

<div class="question">
<h3>2️⃣ Quel est le thème principal du site ?</h3>

<select id="q2">
<option value="3">--Choisir une réponse--</option>
<option value="1">Fusils d'assaut</option>
<option value="2">Fusils à pompe</option>
<option value="3">Armes de poing</option>
</select>

</div>

<div class="question">
<h3>3️⃣ Écris le nom du site.</h3>
<p>Tout en minuscule sans accent</p>

<input type="text" id="q3" placeholder="votre réponse">

</div>

<button onclick="corriger()">Voir mon score</button>

<div id="resultat"></div>

</div>

<script>

let score = 0;
let q1repondu = false;

function repondreVrai(){
document.getElementById("rep1").innerHTML="Bonne réponse ✔";
if(!q1repondu){
score++;
q1repondu=true;
}
}

function repondreFaux(){
document.getElementById("rep1").innerHTML="Mauvaise réponse ❌";
q1repondu=true;
}

function corriger(){

let total = score;

let q2 = document.getElementById("q2").value;

if(q2=="3"){
total++;
}

let q3 = document.getElementById("q3").value.toLowerCase();

if(q3=="glock knowledge"){
total++;
}


let resultatDiv = document.getElementById("resultat");
resultatDiv.className = "score-animation";
resultatDiv.innerHTML = "🎯 Ton score est : "+total+" / 3";


setTimeout(() => {
    resultatDiv.className = "";
}, 800);

}

</script>

</body>
</html>

</body>
</html>
